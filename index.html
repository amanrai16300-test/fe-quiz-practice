<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f5f0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>FE 科目A 演習 — 令和7年度</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme toggle — fixed, lives outside both screens so it shows on home + quiz -->
  <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false" title="Toggle light/dark">
    <span aria-hidden="true">🌙</span><span class="theme-toggle-text">Dark</span>
  </button>

  <!-- Home / paper selection -->
  <div class="home" id="home">
    <header class="home-header">
      <h1 class="home-title">FE Quiz Practice</h1>
      <p class="home-sub">Choose a question set</p>
    </header>
    <ul class="paper-list" id="paperList"></ul>
  </div>

  <div class="app" id="quizApp" hidden>
    <header class="app-header">
      <button class="back-btn" id="backBtn" type="button">← 問題集に戻る</button>
      <p class="exam-set" id="examSet"></p>
      <h1 class="exam-title" id="examTitle"></h1>
    </header>

    <main class="quiz" id="quiz" aria-live="polite">
      <!-- Progress -->
      <div class="progress">
        <span class="progress-label" id="progressLabel"></span>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="summary" id="summary" aria-live="polite">
          <span class="summary-item">回答 <b id="sumAnswered">0</b> / <b id="sumTotal">0</b></span>
          <span class="summary-item is-correct">正解 <b id="sumCorrect">0</b></span>
          <span class="summary-item is-wrong">不正解 <b id="sumWrong">0</b></span>
        </div>
        <nav class="qnav" id="qNav" aria-label="問へ移動"></nav>
      </div>

      <!-- Question card -->
      <section class="card question-card">
        <p class="q-number" id="qNumber"></p>
        <p class="q-text" id="qText"></p>
        <figure class="q-figure" id="qFigure" hidden>
          <img id="qImage" alt="" />
        </figure>

        <button class="translate-btn" id="translateBtn" type="button" aria-expanded="false">
          🌐 翻訳を表示 / Show Translation
        </button>

        <div class="translation" id="translation" hidden>
          <div class="trans-section">
            <p class="trans-heading">問題文 / Question</p>
            <div class="trans-row"><span class="trans-tag">日本語</span><p id="transJa"></p></div>
            <div class="trans-row"><span class="trans-tag">Romaji</span><p id="transRomaji"></p></div>
            <div class="trans-row"><span class="trans-tag">English</span><p id="transEn"></p></div>
          </div>
          <div class="trans-section">
            <p class="trans-heading">選択肢 / Options</p>
            <div class="opt-trans-list" id="optionTrans"></div>
          </div>
        </div>

        <ul class="options" id="options" role="listbox" aria-label="選択肢"></ul>
      </section>

      <!-- Explanation (after submit) -->
      <section class="card explanation-card" id="explanationCard" hidden>
        <p class="explanation-verdict" id="verdict"></p>
        <p class="explanation-answer" id="answerLine"></p>
        <p class="explanation-body" id="explanationBody"></p>
      </section>
    </main>

    <footer class="actions">
      <button class="btn btn-primary" id="submitBtn" type="button" disabled>解答する</button>
      <button class="btn btn-primary" id="nextBtn" type="button" hidden>次の問題 →</button>
    </footer>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
